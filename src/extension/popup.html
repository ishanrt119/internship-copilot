<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 15px; font-family: sans-serif; background: #09090b; color: #fff; }
    h2 { font-size: 16px; margin-top: 0; background: -webkit-linear-gradient(left, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
    button:hover { background: #1d4ed8; }
    #outreachBtn { background: #059669; }
    #outreachBtn:hover { background: #047857; }
    #status { margin-top: 10px; font-size: 13px; color: #a1a1aa; }
  </style>
</head>
<body>
  <h2>Internship Copilot</h2>
  <button id="saveBtn">Save & Match Job</button>
  <button id="outreachBtn">Trigger Cold Email</button>
  <div id="status">Ready</div>
  <script src="popup.js"></script>
</body>
</html>
